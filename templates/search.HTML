<!DOCTYPE HTML>
<html>
<head>
    <title>{{ query }} | Smoogle Search</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
<a class="bg-sky-500 hover:bg-sky-700: rounded-full text-white border-2 border-black w-32 h-12" href="/">Return</a>
<h1 style="text-align: center "> Search Results For: {{ query }}</h1>
{% for link, title, root in data %}
<br>
    <div class="border rounded-full" style="display: flex;">
    <img style="width: 16px; height: 16px;" src="{{ root }}/favicon.ico" alt="favicon"> <a  class="" href="{{ link }}">{{ title }}</a>
</div>
{% endfor %}
</body>
</html>
